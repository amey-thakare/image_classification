<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banana Grade Classifier</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4">

        <h2 class="text-center mb-4">Crop Grade Classifier</h2>

        <form action="/predict" method="post" enctype="multipart/form-data">

            <!-- Upload -->
            <div class="mb-3">
                <label class="form-label">Upload Crop Image</label>
                <input type="file" name="file" class="form-control" required>
            </div>

            <!-- Button -->
            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-primary">
                    Predict Grade
                </button>
            </div>

        </form>

        {% if prediction %}
        <div class="row mt-4">

            <!-- Prediction Card -->
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center d-flex flex-column justify-content-center">

                        <h6 class="text-muted">Prediction</h6>

                        <h3 class="
                            {% if prediction == 'Grade_A' %}
                                text-success
                            {% elif prediction == 'Grade_B' %}
                                text-warning
                            {% else %}
                                text-danger
                            {% endif %}
                        ">
                            {{ prediction }}
                        </h3>

                    </div>
                </div>
            </div>

            <!-- Confidence Card -->
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center">

                        <h6 class="text-muted">Confidence</h6>

                        <div class="progress mt-3" style="height: 30px;">
                            <div 
                                class="progress-bar 
                                    {% if confidence >= 85 %}
                                        bg-success
                                    {% elif confidence >= 60 %}
                                        bg-warning
                                    {% else %}
                                        bg-danger
                                    {% endif %}
                                "
                                role="progressbar"
                                id="confidenceBar"

                                aria-valuenow="{{ confidence }}"
                                aria-valuemin="0"
                                aria-valuemax="100">

                                {{ confidence }}%

                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
        {% endif %}

    </div>
</div>
{% if prediction %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        var confidence = "{{ confidence }}";
        confidence = parseFloat(confidence);

        document.getElementById("confidenceBar").style.width = confidence + "%";
    });
</script>
{% endif %}


</body>
</html>
